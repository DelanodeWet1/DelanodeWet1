{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            {% block title %}
            Sticky Notes for Life
            {% endblock title %}
        </title>
        <link rel="stylesheet" href="{% static 'notes/styles.css' %}" />
    </head>
    <body>
        <header>
            <h1 id="top">
                {% block header %}
                Sticky Notes for Life
                {% endblock header %}
            </h1>
            <a>Remember what counts</a>
        </header>
        <main>
            {% block content %}
            {% endblock content %}
        </main>
        <footer>
            <p>&copy; 2026 StickyNote.inc. All rights reserved.</p>
            <a href="#top" class="back-to-top">Back to Top</a>
        </footer>
    </body>
</html>
